<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Donut</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f6c77a;
    }
    canvas {
      display: block;
    }
    .label {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
<div class="label">🍩 Glossy Donut</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.158.0/build/three.module.js";
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf6c77a);

// Camera
const camera = new THREE.PerspectiveCamera(
  55,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(4, 3, 6);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 2);
keyLight.position.set(5, 8, 5);
keyLight.castShadow = true;
scene.add(keyLight);

const rimLight = new THREE.PointLight(0xffffff, 1.5, 20);
rimLight.position.set(-4, 4, -4);
scene.add(rimLight);

// Floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({
    color: 0xf6c77a,
    roughness: 1
  })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.2;
floor.receiveShadow = true;
scene.add(floor);

// Group
const donutGroup = new THREE.Group();
scene.add(donutGroup);

// Dough Material
const doughMat = new THREE.MeshPhysicalMaterial({
  color: 0xd69258,
  roughness: 0.8,
  metalness: 0,
  clearcoat: 0.1
});

// Donut Body
const donut = new THREE.Mesh(
  new THREE.TorusGeometry(1.5, 0.55, 64, 120),
  doughMat
);
donut.castShadow = true;
donut.receiveShadow = true;
donutGroup.add(donut);

// Icing Material (glossy)
const icingMat = new THREE.MeshPhysicalMaterial({
  color: 0xff7eb6,
  roughness: 0.15,
  metalness: 0,
  transmission: 0,
  clearcoat: 1,
  clearcoatRoughness: 0.05,
  sheen: 1
});

// Icing Geometry (slightly bigger torus)
const icing = new THREE.Mesh(
  new THREE.TorusGeometry(1.5, 0.58, 64, 120),
  icingMat
);
icing.scale.y = 0.45;
icing.position.y = 0.15;
icing.castShadow = true;
donutGroup.add(icing);

// Sprinkles
const sprinkleColors = [
  0xffffff, 0x66ccff, 0xff4444, 0xffff66, 0x99ff99, 0xcc66ff
];

for (let i = 0; i < 80; i++) {
  const sprinkle = new THREE.Mesh(
    new THREE.BoxGeometry(0.12, 0.04, 0.04),
    new THREE.MeshStandardMaterial({
      color: sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)],
      roughness: 0.3
    })
  );

  const angle = Math.random() * Math.PI * 2;
  const radius = 1.2 + Math.random() * 0.5;

  sprinkle.position.set(
    Math.cos(angle) * radius,
    0.45,
    Math.sin(angle) * radius
  );

  sprinkle.rotation.set(
    Math.random() * Math.PI,
    Math.random() * Math.PI,
    Math.random() * Math.PI
  );

  donutGroup.add(sprinkle);
}

// Animation
function animate() {
  requestAnimationFrame(animate);

  donutGroup.rotation.y += 0.005;
  donutGroup.rotation.x = Math.sin(Date.now() * 0.001) * 0.08;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
